version: "2"

run:
  allow-serial-runners: true

linters:
  default: none

  enable:
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnesserr
    - predeclared
    - staticcheck
    - unconvert
    - unused

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/datahub-project/terraform-provider-datahub

  exclusions:
    generated: lax
    paths:
      - examples$
