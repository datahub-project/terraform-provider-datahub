apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: datahub-executor-kv
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.userAssignedIdentityId | quote }}
    keyvaultName: {{ .Values.keyVaultName | quote }}
    tenantId: {{ .Values.tenantId | quote }}
    # objectAlias sets the mounted filename: /mnt/secrets/ABS_ACCOUNT_KEY.
    # Recipe secret references are case-sensitive and must match it exactly.
    objects: |
      array:
        - |
          objectName: abs-account-key
          objectType: secret
          objectAlias: ABS_ACCOUNT_KEY
