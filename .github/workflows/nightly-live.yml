name: Nightly Live

# Triggers:
#   - Every push to main (catches regressions immediately after merge).
#   - Daily at 14:00 UTC (off-peak for hosted runners).
#   - PRs targeting main when the run-live-ci label is present; re-triggers on
#     label add, new commits, and re-open so the result stays current.
#
# Uses the live-acceptance reusable workflow (same logic as the release gate).
on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 14 * * *"
  pull_request:
    types: [labeled, synchronize, reopened]
    branches: [main]

permissions: read-all

concurrency:
  group: nightly-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-acceptance:
    name: Live Acceptance
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-live-ci'))
    uses: ./.github/workflows/live-acceptance.yml

  registry-smoke-test:
    name: Registry Install Smoke Test
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: terraform init from Terraform Registry
        working-directory: examples/runnable/provider-install-verification
        run: terraform init
