name: Release

# Triggered by pushing a tag matching v* (e.g. v0.1.0).
# The goreleaser job is gated behind the "release" GitHub Environment so a
# designated approver must confirm before binaries are built and published.
on:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: false

permissions: read-all

jobs:
  live-acceptance:
    name: Live Acceptance
    uses: ./.github/workflows/live-acceptance.yml

  goreleaser:
    name: GoReleaser
    needs: live-acceptance
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # goreleaser needs the full tag history to generate a correct changelog
          # and to determine the previous tag for release notes.
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Check for existing release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --json id >/dev/null 2>&1; then
            echo "ERROR: GitHub release ${GITHUB_REF_NAME} already exists." >&2
            echo "Delete the release and re-push the tag to retry:" >&2
            echo "  gh release delete ${GITHUB_REF_NAME} --yes" >&2
            echo "  git tag -d ${GITHUB_REF_NAME}" >&2
            echo "  git push origin --delete ${GITHUB_REF_NAME}" >&2
            echo "  git tag -a ${GITHUB_REF_NAME} -m \"Release ${GITHUB_REF_NAME}\"" >&2
            echo "  git push origin ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Extract release notes
        run: bash scripts/extract-release-notes.sh "${GITHUB_REF_NAME#v}"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        with:
          args: release --clean
      - name: Set release body
        # GoReleaser's --release-notes flag does not reliably apply the body
        # through its draft->publish two-step (confirmed v0.4.0). Set the body
        # explicitly after publishing so the behaviour is independent of
        # GoReleaser internals.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${GITHUB_REF_NAME}" --notes-file .release-notes.md
          BODY=$(gh release view "${GITHUB_REF_NAME}" --json body --jq .body)
          if [ -z "$BODY" ]; then
            echo "ERROR: release body for ${GITHUB_REF_NAME} is still empty after set" >&2
            exit 1
          fi
