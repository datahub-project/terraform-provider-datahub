name: Release

# Triggered by pushing a tag matching v* (e.g. v0.1.0).
# The goreleaser job is gated behind the "release" GitHub Environment so a
# designated approver must confirm before binaries are built and published.
on:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: false

permissions: read-all

jobs:
  live-acceptance:
    name: Live Acceptance
    uses: ./.github/workflows/live-acceptance.yml

  goreleaser:
    name: GoReleaser
    needs: live-acceptance
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # goreleaser needs the full tag history to generate a correct changelog
          # and to determine the previous tag for release notes.
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Extract release notes
        run: bash scripts/extract-release-notes.sh "${GITHUB_REF_NAME#v}"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        with:
          args: release --clean --release-notes=.release-notes.md
      - name: Verify release body
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY=$(gh release view "${GITHUB_REF_NAME}" --json body --jq .body)
          if [ -z "$BODY" ]; then
            echo "ERROR: published release body for ${GITHUB_REF_NAME} is empty" >&2
            exit 1
          fi
